<body>
<div id="header">
  <button class="hamburger" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
    <span></span>
  </button>

  <div class="search-wrap">

  <div class="header-tabs">

    <button class="header-tab" onclick="setView('oem')" id="tab-oem">OEM Relationships</button>
    <button class="header-tab" onclick="setView('guide')" id="tab-guide">🏛️ Antique Guide</button>
    <button class="header-tab" onclick="setView('collection')" id="tab-collection">🔬 My Collection</button>
  </div>
</div>

<div id="layout">
  <aside id="sidebar">
    <div class="sidebar-filters">
      <div class="filter-row" id="cat-filters">

        <button class="filter-btn active" onclick="setSt('all')" data-st="all">All</button>
        <button class="filter-btn" onclick="setSt('active')" data-st="active">Active</button>
        <button class="filter-btn" onclick="setSt('historical')" data-st="historical">Historical</button>
      </div>
    </div>
    <div class="sidebar-list" id="company-list"></div>
  </aside>
  <main id="main"></main>
</div>
<div id="compare-tray">
  <span class="tray-label">Comparing:</span>
  <div class="tray-items" id="tray-items"></div>
  <button class="tray-cmp" onclick="setView('compare')">View Comparison →</button>
</div>

  <div class="modal-box" id="modal-box"></div>

<script>
// Guard: show helpful error if data file missing
if(typeof DB === 'undefined'){
  document.getElementById('main').innerHTML=`<div class="load-error">
    <strong>Data file not found.</strong><br><br>
    MicroscopeDB requires <strong>microscope_data.js</strong> in the same folder as this HTML file.<br><br>
    Keep both files together:<br>&nbsp;&nbsp;📄 MicroscopeDB.html<br>&nbsp;&nbsp;📊 microscope_data.js
  </div>`;
  document.getElementById('sidebar').innerHTML='';
  throw new Error('microscope_data.js not found');
}

// ─── STATE ───
const S={view:'home',co:null,cat:'all',st:'all',q:'',mf:'all',cmp:[],msgs:[],loading:false};
const G=id=>DB.companies.find(c=>c.id===id);
const GM=(cid,mid)=>{const c=G(cid);return c?c.models.find(m=>m.id===mid):null};
const inC=(cid,mid)=>S.cmp.some(i=>i.c===cid&&i.m===mid);
const pills=cats=>(cats||[]).map(c=>`<span class="cat-pill pill-${c}">${c}</span>`).join('');
const tierLbl=t=>({budget:'Budget',mid:'Mid-Range',premium:'Premium',ultra:'Ultra'}[t]||t);
const discLabel=d=>d===true?' (disc.)':(d&&d!==false?` (disc. ${d})`:'');

function filtered(){
  return DB.companies.filter(c=>{
    if(S.cat!=='all'&&!c.categories.includes(S.cat))return false;
    if(S.st!=='all'&&c.status!==S.st)return false;
    if(S.q){const q=S.q.toLowerCase();if(!c.name.toLowerCase().includes(q)&&!c.shortName.toLowerCase().includes(q)&&!c.models.some(m=>m.name.toLowerCase().includes(q)))return false}
    return true;
  });
}

// ─── SIDEBAR ───
function renderSidebar(){
  const list=document.getElementById('company-list');
  const cos=filtered();
  const featured=cos.filter(c=>c.featured);
  const regular=cos.filter(c=>c.status==='active'&&!c.featured);
  const hist=cos.filter(c=>c.status==='historical');
  let h='';
  if(featured.length){h+=`<div class="sidebar-section-label">★ The Big Four</div>`;featured.forEach(c=>{h+=coItem(c,true)})}
  if(regular.length){h+=`<div class="sidebar-section-label">Other Active (${regular.length})</div>`;regular.forEach(c=>{h+=coItem(c,false)})}
  if(hist.length){h+=`<div class="sidebar-section-label">Historical / Absorbed</div>`;hist.forEach(c=>{h+=coItem(c,false)})}
  if(!cos.length)h=`<div style="padding:22px 10px;text-align:center;color:var(--text3);font-size:.9rem">No companies match.</div>`;
  list.innerHTML=h;
}
function coItem(c,feat){
  const sel=S.co===c.id;
  const featCls=feat?' featured-co':'';
  const star=feat?`<span class="co-star" title="Big Four manufacturer">★</span>`:'';
  return`<div class="company-item${sel?' active':''}${featCls}" onclick="selCo('${c.id}')"><div class="company-dot ${c.status==='active'?'dot-active':'dot-hist'}"></div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center">${star}<span class="company-item-name" style="${feat?'margin-left:4px':''}">${c.shortName}</span></div><div class="company-item-country">${c.flag} ${c.country} &middot; Est. ${c.founded}</div><div class="cat-pills" style="margin-top:3px">${pills(c.categories)}</div></div></div>`;
}

// ─── MAIN RENDER ───
function render(){
  renderSidebar();
  const main=document.getElementById('main');
  if(S.view==='home'){renderHome(main)}
  else if(S.view==='browse'){S.co?renderCo(main):renderBrowseLanding(main)}
  else if(S.view==='compare'){renderCompare(main)}
  else if(S.view==='oem'){renderOEM(main)}
  else if(S.view==='guide'){renderGuide(main)}
  else if(S.view==='collection'){renderCollection(main)}
  updateTray();
}

function goHome(){S.co=null;setView('home')}

// ─── HOME ───
function renderHome(main){
  const total=DB.companies.reduce((s,c)=>s+c.models.length,0);
  const act=DB.companies.filter(c=>c.status==='active').length;
  const hist=DB.companies.filter(c=>c.status==='historical').length;
  const stereoCount=DB.companies.reduce((s,c)=>s+c.models.filter(m=>m.type==='stereo').length,0);
  const optCount=DB.companies.reduce((s,c)=>s+c.models.filter(m=>m.type==='optical').length,0);
  const discCount=DB.companies.reduce((s,c)=>s+c.models.filter(m=>m.discontinued&&m.discontinued!==false).length,0);
  const bigFour=DB.companies.filter(c=>c.featured).map(c=>c.shortName).join(', ');

  function photoCard(filename,label,icon,hint){
    return`<div class="photo-card">
      <img src="${filename}" alt="${label}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="photo-placeholder" style="display:none">
        <div class="photo-placeholder-icon">${icon}</div>
        <div class="photo-placeholder-text">Place <strong>${filename}</strong> in the same folder</div>
      </div>
      <div class="photo-card-label">${label}</div>
    </div>`;
  }

  main.innerHTML=`<div class="view">
<div class="home-hero">
  <h1>The <em>Definitive</em> Microscope Reference Database</h1>
  <div class="home-hero-body">
    <div class="home-hero-text">
      <p>MicroscopeDB is a comprehensive reference tool for researchers, buyers, collectors, and enthusiasts. It covers ${DB.companies.length} manufacturers — from the Big Four (${bigFour}) to historical brass-era makers — with ${total}+ documented models spanning student scopes to ultra-research platforms, all with verified specifications and estimated price ranges for new and used instruments.</p>
      <div class="quick-actions">
        <button class="btn btn-primary" onclick="selCo('zeiss')">Browse the Big Four</button>
        <button class="btn btn-ghost" onclick="setView('compare')">Compare Models</button>
        <button class="btn btn-ghost" onclick="setView('guide')">🏛️ Antique Guide</button>
      </div>
    </div>
    <div class="home-photos">
      ${photoCard('stereo_microscope.jpg','Stereo Microscope','🔬','your stereo photo')}
      ${photoCard('compound_microscope.jpg','Compound Microscope','🔬','your compound photo')}
    </div>
  </div>
</div>

<div class="section-title">What's Inside MicroscopeDB</div>
<div class="home-feature-grid">
  <div class="feature-card" onclick="setView('browse')">
    <div class="feature-card-icon">🏭</div>
    <div class="feature-card-title">Manufacturer Profiles &amp; Model Database</div>
    <div class="feature-card-desc">Detailed profiles for ${DB.companies.length} manufacturers with company history, OEM relationships, and full specification sheets for ${total}+ models. Covers active companies and historical makers — from budget education scopes to ultra-research platforms. Every model includes estimated new and used market prices.</div>
    <div class="feature-card-link">Browse all manufacturers</div>
  </div>
  <div class="feature-card" onclick="setView('compare')">
    <div class="feature-card-icon">⚖️</div>
    <div class="feature-card-title">Side-by-Side Model Comparison</div>
    <div class="feature-card-desc">Select up to 4 models from any manufacturer and compare them across 18 specification rows simultaneously — magnification, objectives, illumination, fluorescence, phase contrast, DIC, motorization, and price. Ideal for shortlisting instruments before a purchase decision.</div>
    <div class="feature-card-link">Open comparison tool</div>
  </div>
  <div class="feature-card" onclick="setView('oem')">
    <div class="feature-card-icon">🔗</div>
    <div class="feature-card-title">OEM &amp; Corporate Relationship Map</div>
    <div class="feature-card-desc">The microscopy industry's hidden connections — acquisitions, mergers, OEM supply chains, and rebrands that buyers rarely know about. Learn why an AmScope may be a Motic, why Leica carries the Wild and B&amp;L heritage, and which modern brands share the same optical systems under different nameplates.</div>
    <div class="feature-card-link">View relationship table</div>
  </div>
  <div class="feature-card" onclick="setView('guide')">
    <div class="feature-card-icon">🏛️</div>
    <div class="feature-card-title">Antique &amp; Vintage Microscope Buyers Guide</div>
    <div class="feature-card-desc">A curated guide to historically significant and collectible instruments from the 1820s to the 1950s. Features a complete illustrated timeline of binocular and trinocular head development — from the Wenham prism (1860) to the first trinocular tube (Leitz, 1953) — with current estimated collector values and rarity ratings.</div>
    <div class="feature-card-link">Explore the antique guide</div>
  </div>
</div>

<div class="section-title">Database Scope</div>
<div class="home-scope-grid">
  <div class="scope-card">
    <div class="scope-card-top"><div class="scope-card-icon">🔬</div><div class="scope-card-title">Compound Optical Microscopes</div></div>
    <div class="scope-card-body">Upright and inverted research, clinical, and educational compound microscopes from all major manufacturers. Covers brightfield, phase contrast, darkfield, DIC, and fluorescence instruments across all price tiers.</div>
    <div class="scope-card-stat"><strong>${optCount}</strong> compound models documented</div>
  </div>
  <div class="scope-card">
    <div class="scope-card-top"><div class="scope-card-icon">🪲</div><div class="scope-card-title">Stereo &amp; Zoom Microscopes</div></div>
    <div class="scope-card-body">Greenough and CMO stereo/zoom instruments from entry-level dissection scopes through research fluorescence stereos. Includes historical zoom stereo designs tracing back to the Bausch &amp; Lomb Stereozoom (1947) — the original template for all modern stereos.</div>
    <div class="scope-card-stat"><strong>${stereoCount}</strong> stereo models documented</div>
  </div>
  <div class="scope-card">
    <div class="scope-card-top"><div class="scope-card-icon">📜</div><div class="scope-card-title">Historical &amp; Collectible Instruments</div></div>
    <div class="scope-card-body">Discontinued instruments from the 1830s through the 1980s with used-market price ranges. Includes the Big Four's collectible lines (Zeiss Axiophot, Leica DMRB, Nikon SMZ1500, Olympus BH-2) plus Victorian brass instruments for the antique collector.</div>
    <div class="scope-card-stat"><strong>${discCount}</strong> historical models with valuations</div>
  </div>
  <div class="scope-card">
    <div class="scope-card-top"><div class="scope-card-icon">⭐</div><div class="scope-card-title">The Big Four</div></div>
    <div class="scope-card-body">Zeiss, Leica, Nikon, and Olympus/Evident receive extended coverage with both current and historical model lines — from 1980s collectibles still holding strong used-market value through to current research platforms.</div>
    <div class="scope-card-stat"><strong>${DB.companies.filter(c=>c.featured).reduce((s,c)=>s+c.models.length,0)}</strong> models across the Big Four</div>
  </div>
  <div class="scope-card">
    <div class="scope-card-top"><div class="scope-card-icon">💰</div><div class="scope-card-title">Price Intelligence</div></div>
    <div class="scope-card-body">Every model includes estimated price ranges for both new and used/refurbished instruments. Discontinued models include current collector market valuations sourced from recent auction and dealer data. Ranges reflect complete, functional, good-condition examples.</div>
    <div class="scope-card-stat">New &amp; used prices on all <strong>${total}</strong> models</div>
  </div>
  <div class="scope-card">
    <div class="scope-card-top"><div class="scope-card-icon">🏭</div><div class="scope-card-title">OEM &amp; Corporate History</div></div>
    <div class="scope-card-body">${DB.oem_relations.length} documented OEM supply relationships, acquisitions, mergers, and rebrands. Covers both current supply chains (Motic → AmScope) and historical corporate events (Wild → Leica, Bausch &amp; Lomb → Leica, Olympus → Evident).</div>
    <div class="scope-card-stat"><strong>${DB.oem_relations.length}</strong> OEM relationships documented</div>
  </div>
</div>

<div class="section-title">Manufacturer Coverage</div>
<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px">
  ${DB.companies.map(c=>`<div style="display:flex;align-items:center;gap:6px;background:var(--white);border:1px solid var(--border);border-radius:7px;padding:7px 13px;cursor:pointer;transition:all .15s;font-size:.9rem" onmouseover="this.style.borderColor='var(--blue)';this.style.background='var(--blue-light)'" onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--white)'" onclick="selCo('${c.id}')"><span>${c.flag}</span><span style="font-weight:${c.featured?700:500};color:var(--navy)">${c.shortName}</span>${c.featured?'<span style="color:var(--amber-bright);font-size:.8rem">★</span>':''}<span style="font-size:.77rem;color:var(--text3)">${c.models.length} models</span></div>`).join('')}
</div>
</div>`;
}


function renderBrowseLanding(el){
  const active=DB.companies.filter(c=>c.status==='active');

    <div class="bl-group-title">${label}</div>

        ${co.featured?'<span class="bl-chip-star">★</span>':''}

    </div>`:''
  el.innerHTML=`<div class="view bl-landing">

// ─── ACCESSORIES RENDERER ───
function renderAccessories(acc){
  if(!acc) return '';
  const sections={
    stands:'Stands & Bases',heads:'Observation Heads',condensers:'Condensers',
    fluorescence:'Fluorescence & Illumination',cameras:'Camera & Documentation',
    teaching:'Teaching Accessories',illumination:'Illumination',
    auxiliary_objectives:'Auxiliary Objectives',eyepieces:'Eyepieces'
  };
  let html='';
  for(const [key,label] of Object.entries(sections)){
    if(!acc[key]||!acc[key].length) continue;
    const rows=acc[key].map(item=>{
      const n=typeof item==='string'?item:(item.name||'');
      const c=typeof item==='object'&&item.code?item.code:'';
      const note=typeof item==='object'&&item.note?item.note:(typeof item==='string'?'':'');
      return `<tr><td class="acc-name">${n}${c?`<div class="acc-code">${c}</div>`:''}</td><td class="acc-note">${note}</td></tr>`;
    }).join('');
    html+=`<div class="acc-section-head">${label}</div><table class="acc-table"><tbody>${rows}</tbody></table>`;
  }
  return html?`<div class="modal-sec"><div class="modal-sec-title">🗂️ Accessories &amp; Compatibility Guide</div>${html}</div>`:'';
}

function renderBinoSection(){
  return`<div class="bino-section">
<h3>👁️ Binocular &amp; Trinocular Heads: A Complete History</h3>
<p class="bino-intro">The progression from monocular to binocular to trinocular heads spans three centuries and represents one of the most important ergonomic and scientific advances in microscopy. Understanding this timeline helps collectors identify the capabilities and rarity of any antique instrument.</p>
<div class="bino-callout">
  <strong>Why binocular matters for collectors:</strong> Before the Wenham prism (1860), essentially all compound microscopes were monocular. Binocular instruments were expensive, difficult to make, and rare. A genuine Victorian Wenham binocular from a top maker (Powell &amp; Lealand, Ross, Beck, Watson) represents the pinnacle of 19th-century instrument making and commands a significant premium. Trinocular instruments from before 1960 are genuinely uncommon — the Leitz FS trinocular tube (1953) was the first widely adopted design, and pre-war examples with camera ports are exceptional finds.
</div>
<div class="tl-legend">
  <div class="tl-leg-item"><div class="tl-leg-dot" style="background:var(--amber-bright)"></div>Pioneering invention</div>
  <div class="tl-leg-item"><div class="tl-leg-dot" style="background:var(--blue)"></div>Major commercial development</div>
  <div class="tl-leg-item"><div class="tl-leg-dot" style="background:var(--purple)"></div>Trinocular / photomicrography milestone</div>
  <div class="tl-leg-item"><div class="tl-leg-dot" style="background:var(--green)"></div>Era shift / industry standard</div>
</div>
<div class="timeline">
  <div class="tl-item"><div class="tl-year">1677</div><div class="tl-dot dot-pioneer"></div><div class="tl-content"><div class="tl-title">First Binocular Microscope Concept</div><div class="tl-desc">Chérubin d'Orléans adapts the binocular telescope principle to a microscope — two complete monocular systems side by side. The image is pseudoscopic (relief appears reversed) and the design is impractical for high-power work, but the concept is established.</div><div class="tl-maker">Chérubin d'Orléans, France</div></div></div>
  <div class="tl-item"><div class="tl-year">1853</div><div class="tl-dot dot-pioneer"></div><div class="tl-content"><div class="tl-title">Riddell Prism Binocular — First Single-Objective Design</div><div class="tl-desc">Prof. John Leonard Riddell (Tulane University) presents the first binocular microscope using a single objective with a prism to split the light beam to both eyes. Still pseudoscopic, but a critical conceptual breakthrough. Nachet independently develops a similar prism binocular in Paris the same year.</div><div class="tl-maker">J.L. Riddell, New Orleans; C. Nachet, Paris</div></div></div>
  <div class="tl-item"><div class="tl-year">1860–61</div><div class="tl-dot dot-pioneer"></div><div class="tl-content"><div class="tl-title">Wenham Prism — The Dominant Victorian Binocular</div><div class="tl-desc">Francis Herbert Wenham (marine engineer turned optical adviser to Ross) presents his reflecting dividing prism to the Microscopical Society of London on 12 December 1860. The Wenham prism divides the emergent pencil of light geometrically — one half to each eye via a half-silvered prism above the objective — producing an orthoscopic (correct relief) image at medium power. Interpupillary adjustment via rack-and-pinion. This design is immediately adopted by nearly every British and American maker and remains the standard binocular arrangement for 60+ years. Converts existing monoculars from Ross, Beck, Watson, Powell &amp; Lealand.</div><div class="tl-maker">F.H. Wenham (optical adviser to Ross &amp; Co.); adopted by Smith Beck &amp; Beck, Watson, Powell &amp; Lealand, Bausch &amp; Lomb, Zentmayer</div></div></div>
  <div class="tl-item"><div class="tl-year">c.1862</div><div class="tl-dot dot-major"></div><div class="tl-content"><div class="tl-title">First Commercial Wenham Binoculars</div><div class="tl-desc">Smith Beck &amp; Beck (formerly Smith &amp; Beck) manufacture the first commercial Universal Model binocular microscopes incorporating the Wenham prism body. Ross follows immediately. Within five years, all leading English makers offer binocular bodies. These are available as complete instruments or as conversion kits for existing monoculars. Limitation: the aperture of the objective is halved, so resolution is reduced in binocular mode.</div><div class="tl-maker">Smith Beck &amp; Beck, R. &amp; J. Beck, Andrew Ross, W. Watson &amp; Sons</div></div></div>
  <div class="tl-item"><div class="tl-year">c.1876</div><div class="tl-dot dot-major"></div><div class="tl-content"><div class="tl-title">American Wenham Binoculars — Bausch &amp; Lomb and Zentmayer</div><div class="tl-desc">Bausch &amp; Lomb introduces the Universal Model microscope with binocular tubes, bringing the Wenham binocular to the American market at scale. Zentmayer (Philadelphia) offers his Grand American and Centennial models with binocular option. The binocular head becomes a mark of a serious research instrument in American universities and hospitals.</div><div class="tl-maker">Bausch &amp; Lomb (Rochester NY), J. Zentmayer (Philadelphia)</div></div></div>
  <div class="tl-item"><div class="tl-year">c.1890</div><div class="tl-dot dot-pioneer"></div><div class="tl-content"><div class="tl-title">Greenough Stereo Microscope — True Stereoscopic Vision</div><div class="tl-desc">Horatio S. Greenough collaborates with Carl Zeiss (Jena) to develop a microscope with two completely separate optical paths — one per eye — angled at 10–16°. Porro prisms in each path erect the image. Unlike the Wenham (which halves aperture and gives only partial stereopsis), the Greenough gives true 3D depth perception and retains full aperture in each path. This becomes the foundation of all modern stereo microscopes. Zeiss markets it commercially in the mid-1890s.</div><div class="tl-maker">H.S. Greenough &amp; Carl Zeiss, Jena</div></div></div>
  <div class="tl-item"><div class="tl-year">1900–1910</div><div class="tl-dot dot-major"></div><div class="tl-content"><div class="tl-title">Binocular Becomes Standard on Research Instruments</div><div class="tl-desc">By the Edwardian era, a binocular head is considered essential on any serious research microscope. All major makers (Zeiss, Leitz, B&amp;L, Watson, Beck, Powell &amp; Lealand) include binocular models in their standard catalogues. Interpupillary distance (IPD) is now adjustable on most instruments. The Wenham prism design is refined but unchanged in principle. German makers (Zeiss, Leitz) begin offering alternative prism arrangements that preserve more of the objective's full aperture.</div><div class="tl-maker">All major makers; Zeiss and Leitz lead in optical refinement</div></div></div>
  <div class="tl-item"><div class="tl-year">c.1910–1930</div><div class="tl-dot dot-major"></div><div class="tl-content"><div class="tl-title">Inclined Binocular Tubes — Ergonomics Improve</div><div class="tl-desc">The early Wenham binoculars use straight vertical tubes requiring the observer to look directly downward, causing neck strain. The transition era sees the introduction of inclined binocular heads (typically 30° or 45°), first on German instruments (Zeiss, Leitz) then adopted universally. This is a major ergonomic improvement enabling extended microscopy sessions. The inclined binocular head at 45° becomes the universal standard for research instruments.</div><div class="tl-maker">Carl Zeiss (Jena), E. Leitz (Wetzlar), Bausch &amp; Lomb</div></div></div>
  <div class="tl-item"><div class="tl-year">c.1930s</div><div class="tl-dot dot-major"></div><div class="tl-content"><div class="tl-title">Fixed vs. Adjustable IPD — Modern Head Ergonomics</div><div class="tl-desc">Early binocular heads had limited interpupillary distance (IPD) adjustment — the tube separation was altered by physically sliding tubes. Modern binocular heads introduce smooth, wide-range IPD adjustment (typically 48–75mm) via a rotating hinge mechanism, diopter adjustment on both eyepiece tubes, and matched eyepiece parfocality. This is the design used on all modern research microscopes and first appears on top-tier instruments from Zeiss and Leitz in the 1930s.</div><div class="tl-maker">Carl Zeiss Jena, E. Leitz Wetzlar</div></div></div>
  <div class="tl-item"><div class="tl-year">c.1850–1940</div><div class="tl-dot dot-purple"></div><div class="tl-content"><div class="tl-title">Photomicrography Before Trinoculars — Adapter Methods</div><div class="tl-desc">Before dedicated trinocular ports, photomicrography was accomplished by replacing an eyepiece with a camera bellows adapter, or using a separate vertical photographic tube alongside the binocular head. The Leitz Aristophot stand (introduced 1941) became the industry standard for photomicrography using this approach — a dedicated photographic column with the binocular head for simultaneous viewing and photography using a beam-splitting arrangement.</div><div class="tl-maker">E. Leitz (Aristophot, 1941), Carl Zeiss, Bausch &amp; Lomb</div></div></div>
  <div class="tl-item"><div class="tl-year">c.1953</div><div class="tl-dot dot-trinocular"></div><div class="tl-content"><div class="tl-title">Leitz FS Trinocular Tube — First Practical Trinocular Standard</div><div class="tl-desc">Ernst Leitz Wetzlar introduces the FS (Foto-Schnellwechsel, "fast photo change") trinocular tube, providing a dedicated third vertical port for a camera while both eyepieces remain in use. A beam-splitting prism divides light: typically 80% to eyepieces, 20% to the camera port (or switched 100% to camera via lever). This becomes the <em>de facto</em> standard that all subsequent makers follow. Zeiss, Nikon, Olympus, and B&amp;L all introduce comparable trinocular heads within five years.</div><div class="tl-maker">Ernst Leitz Wetzlar (FS trinocular); Carl Zeiss, Nikon follow c.1955–1960</div></div></div>
  <div class="tl-item"><div class="tl-year">1955–1965</div><div class="tl-dot dot-era"></div><div class="tl-content"><div class="tl-title">Industry-Wide Trinocular Adoption</div><div class="tl-desc">The trinocular head becomes standard on all research-grade instruments from every major maker. Zeiss, Nikon, Olympus, and Bausch &amp; Lomb all introduce research stands with trinocular heads. The 35mm SLR camera adapts directly to the camera port. This era marks the beginning of systematic photomicrographic documentation in research. Instruments from this period (Zeiss Standard WL trinocular, Leitz Ortholux trinocular, Nikon S trinocular) represent the earliest practically accessible vintage trinoculars.</div><div class="tl-maker">All major makers — Zeiss (Standard WL), Leitz (Ortholux), Nikon (S series), Olympus (BH), B&amp;L</div></div></div>
</div>
</div>`;
}

function renderAntiqueGrid(){
  const F=AG.filters;
  let html='';
  for(const era of AG.eras){
    if(!era.items)continue;
    if(F.era!=='all'&&F.era!==era.id)continue;
    let rows=era.items.filter(i=>{
      if(F.origin!=='All'&&i.origin!==F.origin)return false;
      if(F.value!=='All'){
        const v=i.valueBand;
        if(F.value==='Under $500'&&v!=='low')return false;
        if(F.value==='$500–$2k'&&v!=='mid')return false;
        if(F.value==='$2k–$10k'&&v!=='high')return false;
        if(F.value==='$10k+'&&v!=='ultra')return false;
      }
      if(F.head!=='All'){
        if(F.head==='Monocular only'&&!i.heads.includes('mono'))return false;
        if(F.head==='Binocular available'&&!i.heads.includes('bino'))return false;
        if(F.head==='Binocular dedicated'&&!i.heads.includes('bino-only'))return false;
        if(F.head==='Trinocular available'&&!i.heads.includes('tri'))return false;
      }
      return true;
    });
    if(!rows.length)continue;
    const rarityLbl={common:'Common',scarce:'Scarce',rare:'Rare',exceptional:'Exceptional'};
    const valCls={low:'v-low',mid:'v-mid',high:'v-high',ultra:'v-ultra'};
    const headLabels={'mono':'Monocular','bino':'Wenham Bino','bino-only':'Bino Dedicated','stereo':'Stereo','tri':'Trinocular'};
    const headCls={'mono':'ht-mono','bino':'ht-bino','bino-only':'ht-bino-only','stereo':'ht-stereo','tri':'ht-tri'};
    html+=`<div class="era-section">
<div class="era-header"><span class="era-icon">${era.icon}</span><div><div class="era-title">${era.title}</div><div class="era-sub">${era.sub}</div></div><span class="era-count">${rows.length} instrument${rows.length!==1?'s':''}</span></div>
<div class="antique-table-wrap"><table class="antique-table">
<thead><tr><th>Maker</th><th>Model / Series</th><th>Origin</th><th>Years</th><th>Head Type(s)</th><th>Construction</th><th>Key Features &amp; Significance</th><th>Rarity</th><th>Est. Value (complete)</th></tr></thead>
<tbody>${rows.map(i=>`<tr>
<td><div class="at-maker">${i.maker}</div></td>
<td><div class="at-model">${i.model}</div></td>
<td class="at-origin"><span class="flag-sm">${i.flag}</span>${i.origin}</td>
<td class="at-years">${i.years}</td>
<td><div class="headtype-pills">${(i.heads||['mono']).map(h=>`<span class="ht-pill ${headCls[h]||'ht-mono'}">${headLabels[h]||h}</span>`).join('')}</div></td>
<td><span style="font-size:.87rem;color:var(--text2)">${i.construction}</span></td>
<td class="at-features">${i.features}</td>
<td><span class="rarity-pill r-${i.rarity}">${rarityLbl[i.rarity]}</span></td>
<td><span class="value-range ${valCls[i.valueBand]}">${i.value}</span></td>
</tr>`).join('')}
</tbody></table></div></div>`;
  }
  if(!html)html=`<div class="empty-state"><h3>No instruments match</h3><p>Try adjusting the filters above.</p></div>`;
  return html;
}

// ─── COMPARE TRAY ───
function toggleCmp(cid,mid){
  const idx=S.cmp.findIndex(i=>i.c===cid&&i.m===mid);
  if(idx>=0){S.cmp.splice(idx,1)}else{if(S.cmp.length>=4){alert('Maximum 4 models.');return}S.cmp.push({c:cid,m:mid})}
  updateTray();updateBadge();
  if(S.view==='browse'&&S.co)renderCo(document.getElementById('main'));
  if(S.view==='compare')renderCompare(document.getElementById('main'));
}
function clearCmp(){S.cmp=[];updateTray();updateBadge();renderCompare(document.getElementById('main'))}
function updateTray(){
  const tray=document.getElementById('compare-tray'),items=document.getElementById('tray-items');
  const main=document.getElementById('main');
  if(!S.cmp.length){tray.classList.remove('visible');if(main)main.style.paddingBottom='0';return}
  if(main)main.style.paddingBottom='72px';
  tray.classList.add('visible');
  items.innerHTML=S.cmp.map(({c,m})=>{const co=G(c),mo=GM(c,m);if(!co||!mo)return'';return`<div class="tray-item"><span>${co.shortName}: ${mo.name}</span><span class="tray-rm" onclick="toggleCmp('${c}','${m}')">×</span></div>`}).join('');
}
function updateBadge(){const b=document.getElementById('cmp-badge');if(S.cmp.length){b.style.display='inline-flex';b.textContent=S.cmp.length}else b.style.display='none'}

// ─── NAVIGATION ───
function setView(v){S.view=v;if(isMobile())closeSidebar();document.querySelectorAll('.header-tab').forEach(t=>t.classList.remove('active'));const tab=document.getElementById('tab-'+v);if(tab)tab.classList.add('active');render()}
function selCo(id){S.co=id;S.mf='all';S.view='browse';if(isMobile())closeSidebar();document.querySelectorAll('.header-tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-browse').classList.add('active');render();document.getElementById('main').scrollTop=0}
function setCat(c){S.cat=c;document.querySelectorAll('#cat-filters .filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===c));renderSidebar()}
function setSt(s){S.st=s;document.querySelectorAll('#st-filters .filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.st===s));renderSidebar()}
function setMF(t){S.mf=t;renderCo(document.getElementById('main'))}
let st;function handleSearch(v){clearTimeout(st);S.q=v;st=setTimeout(()=>{renderSidebar();if(S.view==='browse'){S.co?renderCo(document.getElementById('main')):renderBrowseLanding(document.getElementById('main'))}},160)}
render();

// ── MOBILE SIDEBAR ──
function isMobile(){return window.innerWidth<=768}
function toggleSidebar(){
  if(!isMobile())return;
  const open=document.getElementById('sidebar').classList.toggle('mobile-open');
  document.getElementById('sidebar-backdrop').classList.toggle('visible',open);
  document.getElementById('hamburger-btn').classList.toggle('is-open',open);
  document.body.style.overflow=open?'hidden':'';
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebar-backdrop').classList.remove('visible');
  document.getElementById('hamburger-btn').classList.remove('is-open');
  document.body.style.overflow='';
}
// Auto-close sidebar on desktop resize
window.addEventListener('resize',()=>{if(!isMobile())closeSidebar()});
</script>
