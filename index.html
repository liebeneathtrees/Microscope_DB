<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroscopeDB — Microscope Reference Database</title>
<script src="microscope_data.js">
// ── MOBILE SIDEBAR ──
function isMobile(){return window.innerWidth<=768}
function toggleSidebar(){
  if(!isMobile())return;
  const open=document.getElementById('sidebar').classList.toggle('mobile-open');
  document.getElementById('sidebar-backdrop').classList.toggle('visible',open);
  document.getElementById('hamburger-btn').classList.toggle('is-open',open);
  document.body.style.overflow=open?'hidden':'';
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebar-backdrop').classList.remove('visible');
  document.getElementById('hamburger-btn').classList.remove('is-open');
  document.body.style.overflow='';
}
// Auto-close sidebar on desktop resize
window.addEventListener('resize',()=>{if(!isMobile())closeSidebar()});
</script>
<style>
:root{
  --navy:#1a3a5c;--blue:#2563eb;--blue-mid:#3b82f6;--blue-light:#eff6ff;
  --blue-pale:#f8fbff;--blue-border:#bfdbfe;--blue-border2:#93c5fd;
  --text:#0f172a;--text2:#374151;--text3:#6b7a80;
  --border:#e2e8f0;--border2:#cbd5e1;
  --white:#ffffff;--bg:#f0f5fb;
  --green:#15803d;--green-bg:#f0fdf4;--green-border:#86efac;
  --red:#dc2626;--red-bg:#fef2f2;--red-border:#fca5a5;
  --amber:#b45309;--amber-bg:#fffbeb;--amber-border:#fcd34d;--amber-bright:#d97706;
  --purple:#6d28d9;--purple-bg:#f5f3ff;--purple-border:#c4b5fd;
  --sidebar-w:265px;--header-h:60px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --base:20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:var(--base);-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;overflow:hidden;display:flex;flex-direction:column}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,textarea{font-family:inherit}
::-webkit-scrollbar{width:7px}::-webkit-scrollbar-thumb{background:var(--blue-border);border-radius:4px}

/* HEADER */
#header{height:var(--header-h);background:var(--navy);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0}
.logo{font-size:1.45rem;font-weight:800;color:#fff;letter-spacing:-.02em;white-space:nowrap;flex-shrink:0;cursor:pointer;transition:opacity .15s;user-select:none;text-decoration:none;display:block}
.logo:hover{opacity:.85}
.logo span{color:#93c5fd}
.search-wrap{flex:1;max-width:480px;position:relative}
.search-wrap input{width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:7px;padding:9px 14px 9px 40px;color:#fff;font-size:1rem;outline:none}
.search-wrap input::placeholder{color:rgba(255,255,255,.45)}
.search-wrap input:focus{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.4)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.45);pointer-events:none}
.header-tabs{display:flex;gap:2px;margin-left:auto}
.header-tab{padding:8px 15px;border-radius:7px;font-size:.9rem;font-weight:500;color:rgba(255,255,255,.65);transition:all .15s;white-space:nowrap}
.header-tab:hover{color:#fff;background:rgba(255,255,255,.12)}
.header-tab.active{color:#fff;background:var(--blue)}
.badge{display:inline-flex;align-items:center;justify-content:center;background:#fff;color:var(--blue);border-radius:99px;font-size:.65rem;font-weight:700;padding:1px 6px;margin-left:4px}

/* LAYOUT */
#layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-filters{padding:11px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:7px}
.filter-row{display:flex;gap:4px}
.filter-btn{flex:1;padding:7px 4px;border-radius:6px;font-size:.8rem;font-weight:500;color:var(--text3);background:transparent;border:1px solid var(--border);cursor:pointer;transition:all .15s;text-align:center}
.filter-btn:hover{color:var(--blue);border-color:var(--blue-mid)}
.filter-btn.active{color:var(--blue);border-color:var(--blue);background:var(--blue-light);font-weight:600}
.sidebar-list{flex:1;overflow-y:auto;padding:7px}
.sidebar-section-label{padding:10px 9px 4px;font-size:.72rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}

/* Standard company item */
.company-item{display:flex;align-items:flex-start;gap:9px;padding:9px;border-radius:7px;cursor:pointer;transition:all .15s;margin-bottom:2px;border:1px solid transparent}
.company-item:hover{background:var(--blue-light);border-color:var(--blue-border)}
.company-item.active{background:var(--blue-light);border-color:var(--blue)}
.company-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.dot-active{background:var(--green)}.dot-hist{background:var(--text3)}
.company-item-name{font-size:.95rem;font-weight:600;color:var(--text);line-height:1.3}
.company-item.active .company-item-name{color:var(--blue)}
.company-item-country{font-size:.78rem;color:var(--text3);margin-bottom:3px}
.cat-pills{display:flex;gap:3px;flex-wrap:wrap}
.cat-pill{font-size:.67rem;padding:2px 7px;border-radius:99px;font-weight:600}
.pill-optical{background:var(--blue-light);color:var(--blue)}
.pill-stereo{background:var(--green-bg);color:var(--green)}

/* FEATURED (Big Four) sidebar items */
.company-item.featured-co{
  border-left:4px solid var(--amber-bright);
  background:var(--amber-bg);
  border-color:var(--amber-border);
  padding-left:7px;
}
.company-item.featured-co:hover{background:#fef3c7;border-color:var(--amber-bright)}
.company-item.featured-co.active{background:#fde68a;border-color:var(--amber-bright)}
.company-item.featured-co .company-item-name{font-size:1rem;font-weight:700;color:var(--navy)}
.company-item.featured-co.active .company-item-name{color:var(--amber)}
.co-star{color:var(--amber-bright);font-size:.85rem;margin-left:2px;flex-shrink:0}

/* MAIN */
#main{flex:1;overflow-y:auto;background:var(--bg);padding-bottom:0;transition:padding-bottom .25s}
.view{padding:24px;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 20px;border-radius:7px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:inherit}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-ghost{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25)}
.btn-ghost:hover{background:rgba(255,255,255,.22)}
.btn-outline{background:#fff;color:var(--navy);border:1px solid var(--border2)}
.btn-outline:hover{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.btn-danger:hover{background:#fee2e2}

/* HOME */
.home-hero{background:var(--navy);color:#fff;border-radius:11px;padding:32px 36px;margin-bottom:22px}
.home-hero h1{font-size:2.1rem;font-weight:700;line-height:1.2;margin-bottom:11px}
.home-hero h1 em{font-style:normal;color:#93c5fd}
.home-hero-body{display:flex;gap:28px;align-items:stretch;min-height:260px}
.home-hero-text{flex:1}
.home-hero-text p{color:rgba(255,255,255,.82);font-size:1rem;line-height:1.78;margin-bottom:20px}
.home-photos{display:flex;gap:14px;flex-shrink:0;align-self:stretch}
.photo-card{width:255px;flex-shrink:0;background:rgba(255,255,255,.07);border:2px dashed rgba(255,255,255,.22);border-radius:9px;overflow:hidden;display:flex;flex-direction:column;cursor:default}
.photo-card img{width:100%;flex:1;min-height:0;object-fit:contain;display:block;background:#0c1d35}
.photo-placeholder{width:100%;flex:1;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:rgba(255,255,255,.04)}
.photo-placeholder-icon{font-size:2.8rem;opacity:.4}
.photo-placeholder-text{font-size:.75rem;color:rgba(255,255,255,.38);text-align:center;line-height:1.5;padding:0 14px}
.photo-card-label{padding:8px 10px;font-size:.78rem;font-weight:600;color:rgba(255,255,255,.65);text-align:center;background:rgba(0,0,0,.22);letter-spacing:.04em;text-transform:uppercase;flex-shrink:0}
.home-feature-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:22px}
.feature-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;gap:11px}
.feature-card:hover{border-color:var(--blue-mid);box-shadow:0 4px 16px rgba(37,99,235,.1);transform:translateY(-1px)}
.feature-card-icon{font-size:1.8rem;line-height:1}
.feature-card-title{font-size:1.05rem;font-weight:700;color:var(--navy)}
.feature-card-desc{font-size:.92rem;color:var(--text2);line-height:1.7;flex:1}
.feature-card-link{font-size:.88rem;font-weight:600;color:var(--blue);display:flex;align-items:center;gap:4px;margin-top:4px}
.feature-card-link::after{content:'→'}
.home-scope-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:22px}
.scope-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:17px}
.scope-card-top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.scope-card-icon{font-size:1.5rem}
.scope-card-title{font-size:.97rem;font-weight:700;color:var(--navy)}
.scope-card-body{font-size:.88rem;color:var(--text2);line-height:1.72}
.scope-card-stat{margin-top:9px;padding-top:9px;border-top:1px solid var(--border);font-size:.82rem;color:var(--text3)}
.scope-card-stat strong{color:var(--blue)}
.photo-tip{background:var(--blue-light);border:1px solid var(--blue-border);border-left:3px solid var(--blue);border-radius:9px;padding:14px 18px;font-size:.9rem;color:var(--navy);line-height:1.72;margin-bottom:22px}
.photo-tip code{background:rgba(37,99,235,.1);border-radius:4px;padding:1px 6px;font-family:monospace;font-size:.88em}
.home-hero h1{font-size:2.1rem;font-weight:700;line-height:1.2;margin-bottom:11px}
.home-hero h1 em{font-style:normal;color:#93c5fd}
.home-hero p{color:rgba(255,255,255,.8);font-size:1.05rem;line-height:1.72;max-width:580px;margin-bottom:22px}
.quick-actions{display:flex;gap:9px;flex-wrap:wrap}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center}
.stat-val{font-size:2.2rem;font-weight:700;color:var(--navy);line-height:1}
.stat-label{font-size:.85rem;color:var(--text3);margin-top:6px}
.section-title{font-size:1.05rem;font-weight:700;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:10px;letter-spacing:-.01em}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.tip-box{background:var(--amber-bg);border:1px solid var(--amber-border);border-left:3px solid var(--amber-bright);border-radius:9px;padding:17px 20px;font-size:.975rem;color:#78350f;line-height:1.78}
.tip-box strong{color:var(--amber)}
.home-oem-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
.home-oem-card{background:var(--white);border:1px solid var(--border);border-radius:9px;padding:15px;cursor:pointer;transition:all .15s}
.home-oem-card:hover{border-color:var(--blue);background:var(--blue-light)}
.home-oem-card h4{font-size:.975rem;font-weight:700;color:var(--navy);margin-bottom:5px}
.home-oem-card p{font-size:.9rem;color:var(--text2);line-height:1.6}

/* COMPANY */
.company-header{background:var(--white);border:1px solid var(--border);border-radius:11px;padding:24px;margin-bottom:20px}
.company-header.featured-header{border-top:4px solid var(--amber-bright)}
.company-header-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:14px}
.company-flag{font-size:2.4rem;line-height:1}
.company-name{font-size:1.7rem;font-weight:700;color:var(--navy);line-height:1.2;margin-bottom:8px}
.company-meta{display:flex;gap:16px;flex-wrap:wrap}
.company-meta-item{display:flex;align-items:center;gap:4px;font-size:.9rem;color:var(--text3)}
.status-badge{padding:3px 11px;border-radius:99px;font-size:.78rem;font-weight:600}
.status-active{background:var(--green-bg);color:var(--green)}
.status-hist{background:#f1f5f9;color:var(--text3)}
.company-overview{font-size:1rem;color:var(--text2);line-height:1.82;margin-bottom:16px}
.oem-relations{display:flex;gap:8px;flex-wrap:wrap;padding-top:16px;border-top:1px solid var(--border)}
.oem-badge{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;font-size:.875rem;font-weight:500;cursor:pointer;border:1px solid;transition:opacity .15s}
.oem-badge:hover{opacity:.8}
.oem-acquired{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.oem-absorbed{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
.oem-supplier{background:var(--blue-light);border-color:var(--blue-border);color:var(--blue)}
.oem-sourced{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.oem-note{background:#f8fafc;border-color:var(--border2);color:var(--text3)}

/* MODELS */
.model-filters{display:flex;gap:7px;margin-bottom:6px;flex-wrap:wrap;align-items:center}
.mag-note{font-size:.78rem;color:var(--text3);margin-bottom:14px;padding:5px 11px;background:var(--bg);border-radius:5px;border-left:2px solid var(--blue-border);display:flex;align-items:center;gap:5px}
.mf-btn{padding:6px 14px;border-radius:99px;font-size:.85rem;font-weight:500;color:var(--text3);border:1px solid var(--border);cursor:pointer;transition:all .15s;background:var(--white)}
.mf-btn:hover{color:var(--blue);border-color:var(--blue)}
.mf-btn.active{color:var(--blue);border-color:var(--blue);background:var(--blue-light);font-weight:600}
.model-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.model-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:18px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column}
.model-card:hover{border-color:var(--blue-mid);box-shadow:0 4px 14px rgba(37,99,235,.1);transform:translateY(-1px)}
.model-card.discontinued-card{background:#f8fafc;opacity:.95}
.mc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.type-badge{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:.03em;text-transform:uppercase}
.type-optical{background:var(--blue-light);color:var(--blue)}
.type-stereo{background:var(--green-bg);color:var(--green)}
.mc-year{font-size:.85rem;color:var(--text3)}
.mc-name{font-size:1.12rem;font-weight:700;color:var(--navy);margin-bottom:4px;line-height:1.25}
.mc-series{font-size:.87rem;color:var(--text3);margin-bottom:9px}
.mc-apps{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.app-tag{font-size:.76rem;padding:3px 8px;border-radius:5px;background:var(--bg);color:var(--text3);border:1px solid var(--border)}
.mc-specs{flex:1;display:flex;flex-direction:column;margin-bottom:13px}
.spec-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px;font-size:.9rem;padding:5px 0;border-bottom:1px solid var(--border)}
.spec-row:last-child{border-bottom:none}
.spec-k{color:var(--text3);flex-shrink:0}
.spec-v{color:var(--text);text-align:right;max-width:185px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sv-yes{color:var(--green);font-weight:600}
.sv-no{color:var(--text3)}

/* PRICE DISPLAY */
.mc-price{display:flex;gap:6px;flex-wrap:wrap;padding:9px 0 11px;border-bottom:1px solid var(--border);margin-bottom:11px}
.price-line{display:flex;align-items:center;gap:5px;font-size:.82rem}
.price-line-label{color:var(--text3);font-weight:500;white-space:nowrap}
.price-line-val{color:var(--navy);font-weight:700}
.price-new-tag{background:var(--green-bg);border:1px solid var(--green-border);border-radius:5px;padding:3px 9px;font-size:.78rem;color:var(--green);font-weight:700}
.price-used-tag{background:var(--blue-light);border:1px solid var(--blue-border);border-radius:5px;padding:3px 9px;font-size:.78rem;color:var(--blue);font-weight:700}
.price-disc-note{font-size:.72rem;color:var(--text3)}

.mc-footer{display:flex;gap:8px;align-items:center;padding-top:11px;border-top:1px solid var(--border);margin-top:auto}
.price-tier{font-size:.76rem;font-weight:700;padding:3px 10px;border-radius:99px}
.tier-budget{background:var(--green-bg);color:var(--green)}
.tier-mid{background:var(--blue-light);color:var(--blue)}
.tier-premium{background:var(--amber-bg);color:var(--amber)}
.tier-ultra{background:var(--purple-bg);color:var(--purple)}
.cmp-btn{margin-left:auto;padding:4px 12px;border-radius:6px;font-size:.8rem;font-weight:600;border:1px solid var(--border2);color:var(--text3);transition:all .15s;cursor:pointer;background:white}
.cmp-btn:hover,.cmp-btn.added{background:var(--blue-light);color:var(--blue);border-color:var(--blue)}
.oem-src-tag{font-size:.72rem;padding:3px 8px;border-radius:5px;background:var(--blue-light);color:var(--blue);border:1px solid var(--blue-border)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:22px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:#fff;border:1px solid var(--border2);border-radius:11px;width:100%;max-width:760px;max-height:90vh;overflow-y:auto;transform:translateY(12px);transition:transform .2s;box-shadow:0 22px 55px rgba(0,0,0,.13)}
.modal-overlay.open .modal-box{transform:translateY(0)}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;padding:22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:10}
.modal-co-name{font-size:.85rem;color:var(--blue);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
.modal-m-name{font-size:1.65rem;font-weight:700;color:var(--navy);line-height:1.2}
.modal-close{width:33px;height:33px;border-radius:7px;background:var(--bg);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--border);flex-shrink:0;transition:all .15s;font-size:1.05rem}
.modal-close:hover{background:var(--red-bg);color:var(--red)}
.modal-body{padding:22px}
.modal-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.modal-price-box{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:14px 18px;margin-bottom:20px;display:flex;gap:24px;flex-wrap:wrap}
.modal-price-item{display:flex;flex-direction:column;gap:3px}
.modal-price-label{font-size:.78rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.modal-price-val{font-size:1.05rem;font-weight:700;color:var(--navy)}
.modal-price-val.price-disc{color:var(--text3);font-size:.9rem;font-style:italic}
.modal-sec{margin-bottom:22px}
.modal-sec-title{font-size:.77rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--blue);margin-bottom:11px;padding-bottom:6px;border-bottom:2px solid var(--blue-light)}
.spec-grid{display:grid;grid-template-columns:repeat(2,1fr);border:1px solid var(--border);border-radius:7px;overflow:hidden}
.sg-entry{padding:10px 14px;border-bottom:1px solid var(--border)}
.sg-entry:nth-child(even){border-left:1px solid var(--border)}
.sg-key{font-size:.77rem;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.sg-val{font-size:.97rem;color:var(--text);font-weight:500;line-height:1.4}
.noteworthy{background:var(--blue-light);border:1px solid var(--blue-border);border-radius:7px;padding:15px 17px;font-size:.97rem;color:var(--navy);line-height:1.78}
.app-tags{display:flex;gap:7px;flex-wrap:wrap}
.app-tag-lg{padding:6px 14px;border-radius:99px;font-size:.9rem;font-weight:500;background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.oem-notice{background:var(--blue-light);border:1px solid var(--blue-border);border-radius:7px;padding:14px 16px;font-size:.95rem;color:var(--navy);line-height:1.75;cursor:pointer}
.oem-notice:hover{border-color:var(--blue)}
.modal-footer{padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:9px}

/* COMPARE */

const tierLbl=t=>({budget:'Budget',mid:'Mid-Range',premium:'Premium',ultra:'Ultra'}[t]||t);

function filtered(){

}

function renderBinoSection(){
  return`<div class="bino-section">
<h3>👁️ Binocular &amp; Trinocular Heads: A Complete History</h3>
<p class="bino-intro">The progression from monocular to binocular to trinocular heads spans three centuries and represents one of the most important ergonomic and scientific advances in microscopy. Understanding this timeline helps collectors identify the capabilities and rarity of any antique instrument.</p>
<div class="bino-callout">
  <strong>Why binocular matters for collectors:</strong> Before the Wenham prism (1860), essentially all compound microscopes were monocular. Binocular instruments were expensive, difficult to make, and rare. A genuine Victorian Wenham binocular from a top maker (Powell &amp; Lealand, Ross, Beck, Watson) represents the pinnacle of 19th-century instrument making and commands a significant premium. Trinocular instruments from before 1960 are genuinely uncommon — the Leitz FS trinocular tube (1953) was the first widely adopted design, and pre-war examples with camera ports are exceptional finds.
</div>
<div class="tl-legend">
  <div class="tl-leg-item"><div class="tl-leg-dot" style="background:var(--amber-bright)"></div>Pioneering invention</div>
  <div class="tl-leg-item"><div class="tl-leg-dot" style="background:var(--blue)"></div>Major commercial development</div>
  <div class="tl-leg-item"><div class="tl-leg-dot" style="background:var(--purple)"></div>Trinocular / photomicrography milestone</div>
  <div class="tl-leg-item"><div class="tl-leg-dot" style="background:var(--green)"></div>Era shift / industry standard</div>
</div>
<div class="timeline">
  <div class="tl-item"><div class="tl-year">1677</div><div class="tl-dot dot-pioneer"></div><div class="tl-content"><div class="tl-title">First Binocular Microscope Concept</div><div class="tl-desc">Chérubin d'Orléans adapts the binocular telescope principle to a microscope — two complete monocular systems side by side. The image is pseudoscopic (relief appears reversed) and the design is impractical for high-power work, but the concept is established.</div><div class="tl-maker">Chérubin d'Orléans, France</div></div></div>
  <div class="tl-item"><div class="tl-year">1853</div><div class="tl-dot dot-pioneer"></div><div class="tl-content"><div class="tl-title">Riddell Prism Binocular — First Single-Objective Design</div><div class="tl-desc">Prof. John Leonard Riddell (Tulane University) presents the first binocular microscope using a single objective with a prism to split the light beam to both eyes. Still pseudoscopic, but a critical conceptual breakthrough. Nachet independently develops a similar prism binocular in Paris the same year.</div><div class="tl-maker">J.L. Riddell, New Orleans; C. Nachet, Paris</div></div></div>
  <div class="tl-item"><div class="tl-year">1860–61</div><div class="tl-dot dot-pioneer"></div><div class="tl-content"><div class="tl-title">Wenham Prism — The Dominant Victorian Binocular</div><div class="tl-desc">Francis Herbert Wenham (marine engineer turned optical adviser to Ross) presents his reflecting dividing prism to the Microscopical Society of London on 12 December 1860. The Wenham prism divides the emergent pencil of light geometrically — one half to each eye via a half-silvered prism above the objective — producing an orthoscopic (correct relief) image at medium power. Interpupillary adjustment via rack-and-pinion. This design is immediately adopted by nearly every British and American maker and remains the standard binocular arrangement for 60+ years. Converts existing monoculars from Ross, Beck, Watson, Powell &amp; Lealand.</div><div class="tl-maker">F.H. Wenham (optical adviser to Ross &amp; Co.); adopted by Smith Beck &amp; Beck, Watson, Powell &amp; Lealand, Bausch &amp; Lomb, Zentmayer</div></div></div>
  <div class="tl-item"><div class="tl-year">c.1862</div><div class="tl-dot dot-major"></div><div class="tl-content"><div class="tl-title">First Commercial Wenham Binoculars</div><div class="tl-desc">Smith Beck &amp; Beck (formerly Smith &amp; Beck) manufacture the first commercial Universal Model binocular microscopes incorporating the Wenham prism body. Ross follows immediately. Within five years, all leading English makers offer binocular bodies. These are available as complete instruments or as conversion kits for existing monoculars. Limitation: the aperture of the objective is halved, so resolution is reduced in binocular mode.</div><div class="tl-maker">Smith Beck &amp; Beck, R. &amp; J. Beck, Andrew Ross, W. Watson &amp; Sons</div></div></div>
  <div class="tl-item"><div class="tl-year">c.1876</div><div class="tl-dot dot-major"></div><div class="tl-content"><div class="tl-title">American Wenham Binoculars — Bausch &amp; Lomb and Zentmayer</div><div class="tl-desc">Bausch &amp; Lomb introduces the Universal Model microscope with binocular tubes, bringing the Wenham binocular to the American market at scale. Zentmayer (Philadelphia) offers his Grand American and Centennial models with binocular option. The binocular head becomes a mark of a serious research instrument in American universities and hospitals.</div><div class="tl-maker">Bausch &amp; Lomb (Rochester NY), J. Zentmayer (Philadelphia)</div></div></div>
  <div class="tl-item"><div class="tl-year">c.1890</div><div class="tl-dot dot-pioneer"></div><div class="tl-content"><div class="tl-title">Greenough Stereo Microscope — True Stereoscopic Vision</div><div class="tl-desc">Horatio S. Greenough collaborates with Carl Zeiss (Jena) to develop a microscope with two completely separate optical paths — one per eye — angled at 10–16°. Porro prisms in each path erect the image. Unlike the Wenham (which halves aperture and gives only partial stereopsis), the Greenough gives true 3D depth perception and retains full aperture in each path. This becomes the foundation of all modern stereo microscopes. Zeiss markets it commercially in the mid-1890s.</div><div class="tl-maker">H.S. Greenough &amp; Carl Zeiss, Jena</div></div></div>
  <div class="tl-item"><div class="tl-year">1900–1910</div><div class="tl-dot dot-major"></div><div class="tl-content"><div class="tl-title">Binocular Becomes Standard on Research Instruments</div><div class="tl-desc">By the Edwardian era, a binocular head is considered essential on any serious research microscope. All major makers (Zeiss, Leitz, B&amp;L, Watson, Beck, Powell &amp; Lealand) include binocular models in their standard catalogues. Interpupillary distance (IPD) is now adjustable on most instruments. The Wenham prism design is refined but unchanged in principle. German makers (Zeiss, Leitz) begin offering alternative prism arrangements that preserve more of the objective's full aperture.</div><div class="tl-maker">All major makers; Zeiss and Leitz lead in optical refinement</div></div></div>
  <div class="tl-item"><div class="tl-year">c.1910–1930</div><div class="tl-dot dot-major"></div><div class="tl-content"><div class="tl-title">Inclined Binocular Tubes — Ergonomics Improve</div><div class="tl-desc">The early Wenham binoculars use straight vertical tubes requiring the observer to look directly downward, causing neck strain. The transition era sees the introduction of inclined binocular heads (typically 30° or 45°), first on German instruments (Zeiss, Leitz) then adopted universally. This is a major ergonomic improvement enabling extended microscopy sessions. The inclined binocular head at 45° becomes the universal standard for research instruments.</div><div class="tl-maker">Carl Zeiss (Jena), E. Leitz (Wetzlar), Bausch &amp; Lomb</div></div></div>
  <div class="tl-item"><div class="tl-year">c.1930s</div><div class="tl-dot dot-major"></div><div class="tl-content"><div class="tl-title">Fixed vs. Adjustable IPD — Modern Head Ergonomics</div><div class="tl-desc">Early binocular heads had limited interpupillary distance (IPD) adjustment — the tube separation was altered by physically sliding tubes. Modern binocular heads introduce smooth, wide-range IPD adjustment (typically 48–75mm) via a rotating hinge mechanism, diopter adjustment on both eyepiece tubes, and matched eyepiece parfocality. This is the design used on all modern research microscopes and first appears on top-tier instruments from Zeiss and Leitz in the 1930s.</div><div class="tl-maker">Carl Zeiss Jena, E. Leitz Wetzlar</div></div></div>
  <div class="tl-item"><div class="tl-year">c.1850–1940</div><div class="tl-dot dot-purple"></div><div class="tl-content"><div class="tl-title">Photomicrography Before Trinoculars — Adapter Methods</div><div class="tl-desc">Before dedicated trinocular ports, photomicrography was accomplished by replacing an eyepiece with a camera bellows adapter, or using a separate vertical photographic tube alongside the binocular head. The Leitz Aristophot stand (introduced 1941) became the industry standard for photomicrography using this approach — a dedicated photographic column with the binocular head for simultaneous viewing and photography using a beam-splitting arrangement.</div><div class="tl-maker">E. Leitz (Aristophot, 1941), Carl Zeiss, Bausch &amp; Lomb</div></div></div>
  <div class="tl-item"><div class="tl-year">c.1953</div><div class="tl-dot dot-trinocular"></div><div class="tl-content"><div class="tl-title">Leitz FS Trinocular Tube — First Practical Trinocular Standard</div><div class="tl-desc">Ernst Leitz Wetzlar introduces the FS (Foto-Schnellwechsel, "fast photo change") trinocular tube, providing a dedicated third vertical port for a camera while both eyepieces remain in use. A beam-splitting prism divides light: typically 80% to eyepieces, 20% to the camera port (or switched 100% to camera via lever). This becomes the <em>de facto</em> standard that all subsequent makers follow. Zeiss, Nikon, Olympus, and B&amp;L all introduce comparable trinocular heads within five years.</div><div class="tl-maker">Ernst Leitz Wetzlar (FS trinocular); Carl Zeiss, Nikon follow c.1955–1960</div></div></div>
  <div class="tl-item"><div class="tl-year">1955–1965</div><div class="tl-dot dot-era"></div><div class="tl-content"><div class="tl-title">Industry-Wide Trinocular Adoption</div><div class="tl-desc">The trinocular head becomes standard on all research-grade instruments from every major maker. Zeiss, Nikon, Olympus, and Bausch &amp; Lomb all introduce research stands with trinocular heads. The 35mm SLR camera adapts directly to the camera port. This era marks the beginning of systematic photomicrographic documentation in research. Instruments from this period (Zeiss Standard WL trinocular, Leitz Ortholux trinocular, Nikon S trinocular) represent the earliest practically accessible vintage trinoculars.</div><div class="tl-maker">All major makers — Zeiss (Standard WL), Leitz (Ortholux), Nikon (S series), Olympus (BH), B&amp;L</div></div></div>
</div>
</div>`;
}

function renderAntiqueGrid(){
  const F=AG.filters;
  let html='';
  for(const era of AG.eras){
    if(!era.items)continue;
    if(F.era!=='all'&&F.era!==era.id)continue;
    let rows=era.items.filter(i=>{
      if(F.origin!=='All'&&i.origin!==F.origin)return false;
      if(F.value!=='All'){
        const v=i.valueBand;
        if(F.value==='Under $500'&&v!=='low')return false;
        if(F.value==='$500–$2k'&&v!=='mid')return false;
        if(F.value==='$2k–$10k'&&v!=='high')return false;
        if(F.value==='$10k+'&&v!=='ultra')return false;
      }
      if(F.head!=='All'){
        if(F.head==='Monocular only'&&!i.heads.includes('mono'))return false;
        if(F.head==='Binocular available'&&!i.heads.includes('bino'))return false;
        if(F.head==='Binocular dedicated'&&!i.heads.includes('bino-only'))return false;
        if(F.head==='Trinocular available'&&!i.heads.includes('tri'))return false;
      }
      return true;
    });
    if(!rows.length)continue;
    const rarityLbl={common:'Common',scarce:'Scarce',rare:'Rare',exceptional:'Exceptional'};
    const valCls={low:'v-low',mid:'v-mid',high:'v-high',ultra:'v-ultra'};
    const headLabels={'mono':'Monocular','bino':'Wenham Bino','bino-only':'Bino Dedicated','stereo':'Stereo','tri':'Trinocular'};
    const headCls={'mono':'ht-mono','bino':'ht-bino','bino-only':'ht-bino-only','stereo':'ht-stereo','tri':'ht-tri'};
    html+=`<div class="era-section">
<div class="era-header"><span class="era-icon">${era.icon}</span><div><div class="era-title">${era.title}</div><div class="era-sub">${era.sub}</div></div><span class="era-count">${rows.length} instrument${rows.length!==1?'s':''}</span></div>
<div class="antique-table-wrap"><table class="antique-table">
<thead><tr><th>Maker</th><th>Model / Series</th><th>Origin</th><th>Years</th><th>Head Type(s)</th><th>Construction</th><th>Key Features &amp; Significance</th><th>Rarity</th><th>Est. Value (complete)</th></tr></thead>
<tbody>${rows.map(i=>`<tr>
<td><div class="at-maker">${i.maker}</div></td>
<td><div class="at-model">${i.model}</div></td>
<td class="at-origin"><span class="flag-sm">${i.flag}</span>${i.origin}</td>
<td class="at-years">${i.years}</td>
<td><div class="headtype-pills">${(i.heads||['mono']).map(h=>`<span class="ht-pill ${headCls[h]||'ht-mono'}">${headLabels[h]||h}</span>`).join('')}</div></td>
<td><span style="font-size:.87rem;color:var(--text2)">${i.construction}</span></td>
<td class="at-features">${i.features}</td>
<td><span class="rarity-pill r-${i.rarity}">${rarityLbl[i.rarity]}</span></td>
<td><span class="value-range ${valCls[i.valueBand]}">${i.value}</span></td>
</tr>`).join('')}
</tbody></table></div></div>`;
  }
  if(!html)html=`<div class="empty-state"><h3>No instruments match</h3><p>Try adjusting the filters above.</p></div>`;
  return html;
}

// ─── COMPARE TRAY ───
function toggleCmp(cid,mid){
  const idx=S.cmp.findIndex(i=>i.c===cid&&i.m===mid);
  if(idx>=0){S.cmp.splice(idx,1)}else{if(S.cmp.length>=4){alert('Maximum 4 models.');return}S.cmp.push({c:cid,m:mid})}
  updateTray();updateBadge();
  if(S.view==='browse'&&S.co)renderCo(document.getElementById('main'));
  if(S.view==='compare')renderCompare(document.getElementById('main'));
}
function clearCmp(){S.cmp=[];updateTray();updateBadge();renderCompare(document.getElementById('main'))}
function updateTray(){
  const tray=document.getElementById('compare-tray'),items=document.getElementById('tray-items');
  const main=document.getElementById('main');
  if(!S.cmp.length){tray.classList.remove('visible');if(main)main.style.paddingBottom='0';return}
  if(main)main.style.paddingBottom='72px';
  tray.classList.add('visible');
  items.innerHTML=S.cmp.map(({c,m})=>{const co=G(c),mo=GM(c,m);if(!co||!mo)return'';return`<div class="tray-item"><span>${co.shortName}: ${mo.name}</span><span class="tray-rm" onclick="toggleCmp('${c}','${m}')">×</span></div>`}).join('');
}
function updateBadge(){const b=document.getElementById('cmp-badge');if(S.cmp.length){b.style.display='inline-flex';b.textContent=S.cmp.length}else b.style.display='none'}

// ─── NAVIGATION ───
function setView(v){S.view=v;if(isMobile())closeSidebar();document.querySelectorAll('.header-tab').forEach(t=>t.classList.remove('active'));const tab=document.getElementById('tab-'+v);if(tab)tab.classList.add('active');render()}
function selCo(id){S.co=id;S.mf='all';S.view='browse';if(isMobile())closeSidebar();document.querySelectorAll('.header-tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-browse').classList.add('active');render();document.getElementById('main').scrollTop=0}
function setCat(c){S.cat=c;document.querySelectorAll('#cat-filters .filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===c));renderSidebar()}
function setSt(s){S.st=s;document.querySelectorAll('#st-filters .filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.st===s));renderSidebar()}
function setMF(t){S.mf=t;renderCo(document.getElementById('main'))}
let st;function handleSearch(v){clearTimeout(st);S.q=v;st=setTimeout(()=>{renderSidebar();if(S.view==='browse'){S.co?renderCo(document.getElementById('main')):renderBrowseLanding(document.getElementById('main'))}},160)}
render();

// ── MOBILE SIDEBAR ──
function isMobile(){return window.innerWidth<=768}
function toggleSidebar(){
  if(!isMobile())return;
  const open=document.getElementById('sidebar').classList.toggle('mobile-open');
  document.getElementById('sidebar-backdrop').classList.toggle('visible',open);
  document.getElementById('hamburger-btn').classList.toggle('is-open',open);
  document.body.style.overflow=open?'hidden':'';
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebar-backdrop').classList.remove('visible');
  document.getElementById('hamburger-btn').classList.remove('is-open');
  document.body.style.overflow='';
}
// Auto-close sidebar on desktop resize
window.addEventListener('resize',()=>{if(!isMobile())closeSidebar()});
